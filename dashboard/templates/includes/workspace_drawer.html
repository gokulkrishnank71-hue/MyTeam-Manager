<aside class="workspace-drawer" data-drawer aria-hidden="true">
  <button class="drawer-backdrop" type="button" data-close-drawer aria-label="Close details"></button>
  <section class="drawer-panel" aria-label="Details panel">
    <header class="drawer-head">
      <div>
        <h2 data-drawer-title>Details</h2>
        <p data-drawer-subtitle>Selected item</p>
      </div>
      <button class="plain-icon" type="button" data-close-drawer aria-label="Close details">&times;</button>
    </header>
    <div class="drawer-body">
      <dl class="drawer-meta">
        <div>
          <dt>Status</dt>
          <dd data-drawer-status>Active</dd>
        </div>
        <div>
          <dt>Owner</dt>
          <dd data-drawer-owner>Team</dd>
        </div>
        <div>
          <dt>Due</dt>
          <dd data-drawer-due>This week</dd>
        </div>
      </dl>
      <p class="panel-subtitle" data-drawer-detail>Open the related module when you need the full workflow. Quick edits stay in this drawer.</p>
    </div>
  </section>
</aside>
